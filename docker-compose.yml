services:
  mongo-db:
    image: mongo:latest
    container_name: DB-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: DB-mongo-ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@DB-mongo:27017/
    depends_on:
      - mongo-db

  # ✅ เปลี่ยนจาก postgres เป็น SQL Server
  db-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: DB-sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"  # ต้องมี uppercase + number + symbol
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: Backend
    restart: always
    ports:
      - "5207:5207"
      - "5555:5555"
    volumes:
      - ./server:/app/server
      - ./shared:/app/shared
      - /app/server/node_modules
    environment:
      - PORT=5207
      - DATABASE_URL=sqlserver://db-sqlserver:1433;database=my_sql_db;user=sa;password=Password123!;trustServerCertificate=true
      - MONGO_URL=mongodb://admin:password@DB-mongo:27017/mydatabase?authSource=admin
    depends_on:
      - mongo-db
      - db-sqlserver
    command: >
      sh -c "npx prisma generate && 
             npx prisma studio --browser none & 
             npx tsx watch index.ts"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: Frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
      - /app/client/node_modules
    depends_on:
      - server

volumes:
  mongo_data:
  sqlserver_data: