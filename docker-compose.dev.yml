services:
  mongo-db:
    image: mongo:latest
    container_name: DB-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: DB-mongo-ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@DB-mongo:27017/
    depends_on:
      - mongo-db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: Backend
    restart: always
    ports:
      - "5207:5207"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - PORT=5207
      - MONGO_URL=mongodb://admin:password@DB-mongo:27017/hotel_db?authSource=admin
    depends_on:
      - mongo-db

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: Frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
      - /app/client/node_modules
    depends_on:
      - server

volumes:
  mongo_data:
