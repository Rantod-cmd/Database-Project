services:
  mongo-db:
    image: mongo:latest
    container_name: DB-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: DB-mongo-ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@DB-mongo:27017/
    depends_on:
      - mongo-db

  db-postgres:
    image: postgres:17-alpine
    container_name: DB-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: my_sql_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: Backend
    restart: always
    ports:
      - "5207:5207"
      - "5555:5555"
    volumes:
      - ./server:/app/server      
      - /app/node_modules 
      - ./shared:/app/shared
    environment:
      - PORT=5207
      - DATABASE_URL=postgresql://user:password@db-postgres:5432/my_sql_db?schema=public  
      - MONGO_URL=mongodb://admin:password@DB-mongo:27017/hotel_db?authSource=admin       
    depends_on:
      - mongo-db
      - db-postgres
    command: >
      sh -c "npx prisma generate && 
             npx prisma studio --browser none & 
             npx tsx watch index.ts"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: Frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
      - /app/client/node_modules
    depends_on:
      - server

volumes:
  mongo_data:
  postgres_data:
